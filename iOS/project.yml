name: Hangover Log
options:
  bundleIdPrefix: com.shimondeitel.hangoverlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Hangover Log:
    type: application
    platform: iOS
    sources:
      - path: Hangover Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hangoverlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Hangover Log/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Hangover LogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Hangover LogTests
      - path: Hangover Log.storekit
    dependencies:
      - target: Hangover Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hangoverlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Hangover LogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Hangover LogUITests
    dependencies:
      - target: Hangover Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hangoverlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Hangover Log:
    build:
      targets:
        Hangover Log: all
        Hangover LogTests: [test]
        Hangover LogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Hangover Log.storekit
    test:
      config: Debug
      storeKitConfiguration: Hangover Log.storekit
      targets:
        - Hangover LogTests
        - Hangover LogUITests
    archive:
      config: Release
